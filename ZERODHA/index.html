<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <img src="https://zerodha.com/static/images/logo.svg" alt="placeholder">
        <nav>
            <a href="https://zerodha.com/open-account/">Signup</a>
            <a href="https://zerodha.com/about/">About</a>
            <a href="https://zerodha.com/products/">Products</a>
            <a href="https://zerodha.com/pricing/">Pricing</a>
            <a href="https://support.zerodha.com/">Support</a>
        </nav>
    </div>
    <div class="content" >
        <img src="https://zerodha.com/static/images/landing.svg" alt="placeholder" >
    </div>
    <div class="content" >
        <h1>Invest in Everything</h1>
    </div>
        <p>Online platform to invest in stocks, derivatives, mutual funds, ETFs, bonds, and more.</p>
    <div class="display">
        <button>Sign up for free</button>
    </div>
    <form>
       <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname" placeholder="Enter your name" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>

        <label>Gender</label>
        <div class="gender">
            <input type="radio" name="gender" value="Male"> Male
            <input type="radio" name="gender" value="Female"> Female
        </div>

        <label>Hobbies</label>
        <div class="hobbies">
            <input type="checkbox" name="hobby" value="Reading"> Reading
            <input type="checkbox" name="hobby" value="Sports"> Sports
            <input type="checkbox" name="hobby" value="Music"> Music
        </div>

        <label for="country">Country</label>
        <select id="country" name="country">
            <option>India</option>
            <option>USA</option>
            <option>UK</option>
            <option>Australia</option>
        </select>

        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Enter your message"></textarea>
    </form>
    <table >
        <tr>
            <th>Company</th>
            <th>Name</th>
            <th>Country</th>
        </tr>
        <tr>
            <td>Infosys</td>
            <td>Keerthana</td>
            <td>Germany</td>
        </tr>
        <tr>
            <td>Wipro</td>
            <td>Ramesh</td>
            <td>USA</td>
        </tr>
        <tr>
            <td>TCS</td>
            <td>Ravi</td>
            <td>India</td>  
        </tr>
        <tr>
            <td>HCL</td>
            <td>Rohit</td>
            <td>UK</td>
        </tr>
    </table>
</body>
</html>
